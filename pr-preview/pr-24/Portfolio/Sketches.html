<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketches Gallery | Anmol Creations</title>
    <link rel="stylesheet" href="../assets/css/gallery.css">
</head>
<body>

    <div class="gallery-container">
        <a href="../Portfolio.html" class="back-link">← Back to Portfolio</a>

        <header class="gallery-header">
            <h1 class="gallery-title">Sketches</h1>
            <p class="gallery-subtitle">A collection of my hand-drawn artwork and creative explorations.</p>
        </header>

        <div id="loader" class="loader">Loading Gallery...</div>

        <div id="gallery-grid" class="gallery-grid">
            <!-- Images will be injected here by JS -->
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <button class="lightbox-close">&times;</button>
        <img id="lightbox-img" src="" alt="Full view">
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api/gallery/Sketches'; // Dev
        // In production, this should point to your live domain or relative path if proxy configured

        const galleryGrid = document.getElementById('gallery-grid');
        const loader = document.getElementById('loader');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxClose = document.querySelector('.lightbox-close');

        // Fetch Images
        async function loadGallery() {
            try {
                // Determine API URL based on environment
                // If we are on localhost, use localhost:3001
                // If served statically, we might need a different strategy or CORS config
                // For now, assuming local development setup
                const response = await fetch(API_URL);

                if (!response.ok) throw new Error('Failed to load images');

                const images = await response.json();

                loader.style.display = 'none';

                if (images.length === 0) {
                    galleryGrid.innerHTML = '<p style="text-align:center; width:100%;">No sketches found.</p>';
                    return;
                }

                images.forEach((img, index) => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.style.animationDelay = `${index * 0.1}s`; // Staggered animation

                    item.innerHTML = `
                        <img src="${img.url}" alt="Sketch ${index + 1}" loading="lazy">
                        <div class="gallery-caption">
                            <span>View Artwork</span>
                        </div>
                    `;

                    // Lightbox Click
                    item.addEventListener('click', () => {
                        lightboxImg.src = img.url;
                        lightbox.classList.add('active');
                    });

                    galleryGrid.appendChild(item);
                });

            } catch (error) {
                console.error(error);
                loader.textContent = 'Could not load gallery. Please try again later.';
            }
        }

        // Lightbox Logic
        lightboxClose.addEventListener('click', () => {
            lightbox.classList.remove('active');
            lightboxImg.src = '';
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
                lightboxImg.src = '';
            }
        });

        // Initialize
        loadGallery();
    </script>
</body>
</html>
